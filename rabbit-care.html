<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>うさぎのお手入れゲーム</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%B0%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg1: #ffe4f0;
    --bg2: #e0f2fe;
    --panel: #ffffffcc;
    --text: #4a3b52;
    --muted: #8a7a92;
    --accent: #ff7aa8;
    --accent-2: #f59ec0;
    --good: #22c55e;
    --warn: #f59e0b;
    --bad: #ef4444;
    --border: #f5d4e2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", "Yu Gothic", "Comic Sans MS", sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 14px 16px 6px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: #b14979;
    text-shadow: 0 2px 0 #fff;
  }
  header p {
    margin: 4px 0 0;
    font-size: 12px;
    color: var(--muted);
  }

  .game {
    max-width: 460px;
    margin: 0 auto;
    padding: 12px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stat .label {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .bar {
    width: 100%;
    height: 8px;
    background: #f1e4eb;
    border-radius: 999px;
    overflow: hidden;
  }
  .bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #ffb3c8, #ff7aa8);
    transition: width 0.4s ease;
    border-radius: 999px;
  }
  .bar.clean > span { background: linear-gradient(90deg, #93e2ff, #38bdf8); }
  .bar.fullness > span { background: linear-gradient(90deg, #ffd591, #f59e0b); }
  .bar.energy > span { background: linear-gradient(90deg, #c4b5fd, #8b5cf6); }

  .score {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .score b { color: var(--accent); font-size: 16px; }

  .stage {
    position: relative;
    background: linear-gradient(180deg, #fff7fb 0%, #fce4ec 100%);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px;
    height: 320px;
    overflow: hidden;
    box-shadow: inset 0 -8px 18px #ffd1e1aa;
  }
  .stage::before {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 60px;
    background: linear-gradient(180deg, #fbcfe8, #f0abfc44);
    border-top: 2px dashed #f9a8d4;
  }
  .clouds {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    font-size: 22px;
    color: #fff;
    display: flex;
    justify-content: space-around;
    opacity: 0.85;
    pointer-events: none;
  }
  .stage-msg {
    position: absolute;
    top: 8px;
    right: 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    box-shadow: 0 2px 8px #fbcfe888;
  }

  .rabbit-wrap {
    position: absolute;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%);
    width: 200px;
    height: 240px;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .rabbit-wrap:active { cursor: grabbing; }
  .rabbit {
    width: 100%;
    height: 100%;
    transition: transform 0.2s ease;
    transform-origin: 50% 100%;
  }
  .rabbit.bounce { animation: bounce 0.6s ease; }
  @keyframes bounce {
    0%   { transform: translateY(0) scale(1, 1); }
    25%  { transform: translateY(-12px) scale(0.98, 1.04); }
    50%  { transform: translateY(0) scale(1.04, 0.96); }
    75%  { transform: translateY(-6px) scale(0.99, 1.02); }
    100% { transform: translateY(0) scale(1, 1); }
  }
  .rabbit.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px) rotate(-3deg); }
    75% { transform: translateX(6px) rotate(3deg); }
  }
  .rabbit.sleep { animation: sleep 2s ease-in-out infinite; }
  @keyframes sleep {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.02, 0.98); }
  }

  .floaty {
    position: absolute;
    pointer-events: none;
    font-size: 22px;
    animation: floaty 1.2s ease-out forwards;
  }
  @keyframes floaty {
    0%   { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
  }
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 16px;
    animation: sparkle 0.9s ease-out forwards;
  }
  @keyframes sparkle {
    0% { transform: translate(-50%, -50%) scale(0.4) rotate(0); opacity: 0; }
    40% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.4) rotate(180deg); opacity: 0; }
  }

  .actions {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 14px;
    padding: 10px 6px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s;
    box-shadow: 0 2px 0 #f5d4e2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .btn:hover { background: #fff5f9; }
  .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #f5d4e2; }
  .btn .ico { font-size: 22px; }
  .btn .name { font-weight: bold; }
  .btn .desc { font-size: 10px; color: var(--muted); }
  .btn.primary { background: linear-gradient(180deg, #ffd1e0, #ffb1cc); border-color: #ffb1cc; }
  .btn[data-tool="brush"].active,
  .btn[data-tool="bath"].active,
  .btn[data-tool="nail"].active {
    outline: 3px solid #ff7aa8;
    background: #fff0f6;
  }

  .footer {
    margin-top: 10px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
  .footer button {
    appearance: none;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: #4a3b5288;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 16px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    max-width: 320px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px #00000022;
  }
  .modal-card h2 { margin: 0 0 8px; color: var(--accent); font-size: 18px; }
  .modal-card p { margin: 0 0 12px; font-size: 13px; color: var(--text); white-space: pre-line; }

  /* Food picker */
  .food-picker {
    position: fixed;
    inset: 0;
    background: #4a3b5266;
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 60;
    padding: 0;
  }
  .food-picker.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .food-picker-card {
    background: #fff;
    border-radius: 22px 22px 0 0;
    padding: 16px 14px 18px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 -10px 30px #00000022;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .food-picker-card h3 {
    margin: 0 0 10px;
    text-align: center;
    font-size: 15px;
    color: var(--accent);
  }
  .food-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .food-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: #fff5f9;
    border-radius: 14px;
    padding: 10px 4px 6px;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    box-shadow: 0 2px 0 #f5d4e2;
  }
  .food-btn .food-emoji { font-size: 28px; line-height: 1; }
  .food-btn .food-name {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .food-btn:active { transform: translateY(1px) scale(0.96); background: #ffe8f1; }
  .food-btn.fav {
    background: linear-gradient(180deg, #fff0f6, #ffd1e0);
    border-color: #ffb1cc;
  }
  .food-btn.fav .food-name { color: #b14979; font-weight: bold; }
  .food-close-btn {
    appearance: none;
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 14px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
  }

  .level-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd1e0, #ffb1cc);
    color: #b14979;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: bold;
    margin-left: 4px;
  }

  /* SVG rabbit cosmetic states */
  .dirt-spot { transition: opacity 0.3s; }
  .heart-eye { display: none; }
  .rabbit-wrap.happy .heart-eye { display: block; }
  .rabbit-wrap.happy .normal-eye { display: none; }
  .rabbit-wrap.sleeping .normal-eye { display: none; }
  .rabbit-wrap.sleeping .sleep-eye { display: block; }
  .sleep-eye { display: none; }
</style>
</head>
<body>
  <header>
    <h1>🐰 うさぎのお手入れ</h1>
    <p>なでて・ブラッシングして・ごはんをあげよう</p>
  </header>

  <div class="game">
    <div class="stats">
      <div class="stat">
        <div class="label">😊 きげん</div>
        <div class="bar"><span id="bar-happy" style="width:80%"></span></div>
      </div>
      <div class="stat">
        <div class="label">✨ きれい</div>
        <div class="bar clean"><span id="bar-clean" style="width:70%"></span></div>
      </div>
      <div class="stat">
        <div class="label">🍽 おなか</div>
        <div class="bar fullness"><span id="bar-full" style="width:60%"></span></div>
      </div>
      <div class="stat">
        <div class="label">⚡️ げんき</div>
        <div class="bar energy"><span id="bar-energy" style="width:75%"></span></div>
      </div>
    </div>

    <div class="score">
      なまえ: <b id="rabbit-name">もちこ</b>
      <span class="level-badge">Lv.<span id="level">1</span></span>
      &nbsp;|&nbsp; お世話ポイント <b id="points">0</b>
    </div>

    <div class="stage" id="stage">
      <div class="clouds"><span>☁️</span><span>☁️</span><span>☁️</span></div>
      <div class="stage-msg" id="msg">タップしてなでよう！</div>

      <div class="rabbit-wrap" id="rabbit">
        <svg class="rabbit" viewBox="0 0 220 290" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="fluffGrad" cx="50%" cy="40%" r="65%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="70%" stop-color="#fff5f9"/>
              <stop offset="100%" stop-color="#ffe1ec"/>
            </radialGradient>
            <radialGradient id="earInner" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffd6e4"/>
              <stop offset="100%" stop-color="#ffb1cc"/>
            </radialGradient>
            <radialGradient id="dressGrad" cx="50%" cy="20%" r="80%">
              <stop offset="0%" stop-color="#f3e8ff"/>
              <stop offset="60%" stop-color="#d8b4fe"/>
              <stop offset="100%" stop-color="#c084fc"/>
            </radialGradient>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="2.2"/>
              <feOffset dy="2"/>
              <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- ground shadow -->
          <ellipse cx="110" cy="282" rx="72" ry="9" fill="#00000018"/>

          <!-- BODY (drawn first) -->
          <g filter="url(#softShadow)">
            <g>
              <circle cx="40"  cy="220" r="14" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="56"  cy="245" r="13" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="80"  cy="255" r="13" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="110" cy="258" r="14" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="140" cy="255" r="13" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="164" cy="245" r="13" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="180" cy="220" r="14" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="184" cy="198" r="12" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="38"  cy="198" r="12" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            </g>
            <ellipse cx="110" cy="220" rx="78" ry="44" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.5"/>
          </g>

          <!-- TAIL -->
          <g filter="url(#softShadow)">
            <circle cx="190" cy="230" r="12" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            <circle cx="196" cy="238" r="7" fill="#ffffff" stroke="#f5dbe7" stroke-width="1"/>
            <circle cx="188" cy="240" r="6" fill="#ffffff" stroke="#f5dbe7" stroke-width="1"/>
          </g>

          <!-- LOP EARS (drooping, drawn behind head) -->
          <g filter="url(#softShadow)">
            <!-- left lop ear -->
            <ellipse cx="70" cy="160" rx="16" ry="62" transform="rotate(22 70 160)" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.5"/>
            <ellipse cx="70" cy="163" rx="7" ry="46" transform="rotate(22 70 163)" fill="url(#earInner)" opacity="0.85"/>
            <!-- ear tip fluff -->
            <circle cx="46" cy="216" r="6" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1"/>
            <circle cx="54" cy="222" r="5" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1"/>
            <!-- right lop ear -->
            <ellipse cx="150" cy="160" rx="16" ry="62" transform="rotate(-22 150 160)" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.5"/>
            <ellipse cx="150" cy="163" rx="7" ry="46" transform="rotate(-22 150 163)" fill="url(#earInner)" opacity="0.85"/>
            <circle cx="174" cy="216" r="6" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1"/>
            <circle cx="166" cy="222" r="5" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1"/>
          </g>

          <!-- DRESS (cake-cupcake themed) -->
          <g filter="url(#softShadow)">
            <!-- skirt main -->
            <path d="M 70 200
                     Q 85 192, 110 192
                     Q 135 192, 150 200
                     Q 165 232, 178 256
                     Q 170 262, 162 260
                     Q 110 272, 58 260
                     Q 50 262, 42 256
                     Q 55 232, 70 200 Z"
                  fill="url(#dressGrad)" stroke="#a78bfa" stroke-width="1.5"/>
            <!-- ruffle scallops at hem -->
            <g fill="#f3e8ff" stroke="#a78bfa" stroke-width="1">
              <path d="M 42 256 Q 52 268, 62 256 L 62 252 Q 52 263, 44 252 Z"/>
              <path d="M 62 256 Q 75 270, 88 256 L 88 252 Q 75 264, 62 252 Z"/>
              <path d="M 88 256 Q 100 271, 112 256 L 112 252 Q 100 264, 88 252 Z"/>
              <path d="M 112 256 Q 124 271, 136 256 L 136 252 Q 124 264, 112 252 Z"/>
              <path d="M 136 256 Q 148 270, 160 256 L 160 252 Q 148 264, 136 252 Z"/>
              <path d="M 160 256 Q 168 268, 178 256 L 176 252 Q 168 263, 158 252 Z"/>
            </g>
            <!-- collar / neckline frill -->
            <ellipse cx="110" cy="194" rx="42" ry="7" fill="#ffffff" stroke="#a78bfa" stroke-width="1.2"/>
            <g fill="#ffffff" stroke="#a78bfa" stroke-width="1">
              <path d="M 70 194 q 4 7, 8 0 z"/>
              <path d="M 78 194 q 4 7, 8 0 z"/>
              <path d="M 86 194 q 4 7, 8 0 z"/>
              <path d="M 94 194 q 4 7, 8 0 z"/>
              <path d="M 102 194 q 4 7, 8 0 z"/>
              <path d="M 110 194 q 4 7, 8 0 z"/>
              <path d="M 118 194 q 4 7, 8 0 z"/>
              <path d="M 126 194 q 4 7, 8 0 z"/>
              <path d="M 134 194 q 4 7, 8 0 z"/>
              <path d="M 142 194 q 4 7, 8 0 z"/>
            </g>
            <!-- dress decorations: cake & cupcake & strawberry -->
            <text x="64" y="232" font-size="17">🧁</text>
            <text x="135" y="232" font-size="17">🍰</text>
            <text x="100" y="250" font-size="13">🍓</text>
            <!-- chest bow -->
            <g transform="translate(110 198)">
              <path d="M-14 0 Q-5 -10 0 0 Q-5 10 -14 0 Z" fill="#ff7aa8" stroke="#e85a8e" stroke-width="1"/>
              <path d="M14 0 Q5 -10 0 0 Q5 10 14 0 Z" fill="#ff7aa8" stroke="#e85a8e" stroke-width="1"/>
              <circle cx="0" cy="0" r="4" fill="#ffd1e0" stroke="#e85a8e" stroke-width="1"/>
              <path d="M-3 4 L-7 12 L-2 10 Z" fill="#ff7aa8"/>
              <path d="M3 4 L7 12 L2 10 Z" fill="#ff7aa8"/>
            </g>
          </g>

          <!-- HEAD (covers ear tops & dress neckline) -->
          <g filter="url(#softShadow)">
            <g>
              <circle cx="58"  cy="120" r="11" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="48"  cy="140" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="55"  cy="158" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="72"  cy="170" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="148" cy="170" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="165" cy="158" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="172" cy="140" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="162" cy="120" r="11" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="150" cy="100" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="70"  cy="100" r="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="90"  cy="86"  r="9"  fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="130" cy="86"  r="9"  fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
              <circle cx="110" cy="78"  r="9"  fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            </g>
            <circle cx="110" cy="138" r="58" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.5"/>
            <ellipse cx="92" cy="110" rx="22" ry="12" fill="#ffffff" opacity="0.7"/>
          </g>

          <!-- cheeks (blush) -->
          <ellipse cx="74"  cy="150" rx="10" ry="6" fill="#ffb1cc" opacity="0.75"/>
          <ellipse cx="146" cy="150" rx="10" ry="6" fill="#ffb1cc" opacity="0.75"/>

          <!-- normal eyes -->
          <g class="normal-eye">
            <ellipse cx="90"  cy="132" rx="6.5" ry="9" fill="#3a2540"/>
            <ellipse cx="130" cy="132" rx="6.5" ry="9" fill="#3a2540"/>
            <circle cx="92"  cy="129" r="2.2" fill="#fff"/>
            <circle cx="132" cy="129" r="2.2" fill="#fff"/>
            <circle cx="88"  cy="135" r="1.2" fill="#fff"/>
            <circle cx="128" cy="135" r="1.2" fill="#fff"/>
          </g>
          <g class="heart-eye">
            <text x="82"  y="142" font-size="18">💗</text>
            <text x="122" y="142" font-size="18">💗</text>
          </g>
          <g class="sleep-eye" stroke="#3a2540" stroke-width="2.4" fill="none" stroke-linecap="round">
            <path d="M82 132 Q90 138 98 132"/>
            <path d="M122 132 Q130 138 138 132"/>
          </g>

          <!-- nose & mouth -->
          <path d="M105 152 Q110 158 115 152 Q113 156 110 156 Q107 156 105 152 Z" fill="#ff7aa8"/>
          <path d="M110 156 L110 161" stroke="#3a2540" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M110 161 Q105 165 102 162" stroke="#3a2540" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M110 161 Q115 165 118 162" stroke="#3a2540" stroke-width="1.6" fill="none" stroke-linecap="round"/>

          <!-- whiskers -->
          <g stroke="#cdb6c1" stroke-width="1" stroke-linecap="round" opacity="0.9">
            <line x1="68" y1="156" x2="44" y2="152"/>
            <line x1="68" y1="160" x2="42" y2="162"/>
            <line x1="152" y1="156" x2="176" y2="152"/>
            <line x1="152" y1="160" x2="178" y2="162"/>
          </g>

          <!-- arms (paws) - peeking from sleeves -->
          <g filter="url(#softShadow)">
            <circle cx="42"  cy="232" r="14" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            <circle cx="178" cy="232" r="14" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            <circle cx="42"  cy="246" r="9"  fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            <circle cx="178" cy="246" r="9"  fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
          </g>

          <!-- feet (toe-beans) -->
          <g filter="url(#softShadow)">
            <ellipse cx="86"  cy="276" rx="20" ry="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
            <ellipse cx="134" cy="276" rx="20" ry="10" fill="url(#fluffGrad)" stroke="#f3cddc" stroke-width="1.2"/>
          </g>
          <ellipse cx="86"  cy="277" rx="7" ry="3.5" fill="#ffc4d6"/>
          <ellipse cx="134" cy="277" rx="7" ry="3.5" fill="#ffc4d6"/>
          <circle cx="80"  cy="274" r="1.6" fill="#ff89ad"/>
          <circle cx="86"  cy="273" r="1.6" fill="#ff89ad"/>
          <circle cx="92"  cy="274" r="1.6" fill="#ff89ad"/>
          <circle cx="128" cy="274" r="1.6" fill="#ff89ad"/>
          <circle cx="134" cy="273" r="1.6" fill="#ff89ad"/>
          <circle cx="140" cy="274" r="1.6" fill="#ff89ad"/>

          <!-- head bow (between ear bases) -->
          <g transform="translate(110 80) rotate(-6)">
            <path d="M-15 0 Q-6 -12 0 0 Q-6 12 -15 0 Z" fill="#ff7aa8" stroke="#e85a8e" stroke-width="1"/>
            <path d="M15 0 Q6 -12 0 0 Q6 12 15 0 Z" fill="#ff7aa8" stroke="#e85a8e" stroke-width="1"/>
            <circle cx="0" cy="0" r="4" fill="#ffd1e0" stroke="#e85a8e" stroke-width="1"/>
            <path d="M-3 4 L-8 14 L-2 11 Z" fill="#ff7aa8"/>
            <path d="M3 4 L8 14 L2 11 Z" fill="#ff7aa8"/>
            <text x="-5" y="3" font-size="6">🍓</text>
          </g>

          <!-- dirt spots (on visible fur) -->
          <g id="dirt">
            <circle class="dirt-spot" cx="68"  cy="125" r="5" fill="#a17a4f" opacity="0"/>
            <circle class="dirt-spot" cx="152" cy="125" r="5" fill="#a17a4f" opacity="0"/>
            <circle class="dirt-spot" cx="42"  cy="232" r="4" fill="#a17a4f" opacity="0"/>
            <circle class="dirt-spot" cx="86"  cy="274" r="3.5" fill="#a17a4f" opacity="0"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" id="btn-pet">
        <span class="ico">🤚</span><span class="name">なでなで</span><span class="desc">きげん UP</span>
      </button>
      <button class="btn" id="btn-feed">
        <span class="ico">🍰</span><span class="name">ごはん</span><span class="desc">メニューから選ぶ</span>
      </button>
      <button class="btn" data-tool="brush" id="btn-brush">
        <span class="ico">🪮</span><span class="name">ブラシ</span><span class="desc">ドラッグでとかす</span>
      </button>
      <button class="btn" data-tool="bath" id="btn-bath">
        <span class="ico">🛁</span><span class="name">おふろ</span><span class="desc">よごれをおとす</span>
      </button>
      <button class="btn" data-tool="nail" id="btn-nail">
        <span class="ico">💅</span><span class="name">つめきり</span><span class="desc">あしをタップ</span>
      </button>
      <button class="btn" id="btn-sleep">
        <span class="ico">💤</span><span class="name">おやすみ</span><span class="desc">げんき回復</span>
      </button>
    </div>

    <div class="footer">
      <button id="btn-rename">なまえをかえる</button>
      &nbsp;｜&nbsp;
      <button id="btn-reset">リセット</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <h2 id="modal-title">レベルアップ！</h2>
      <p id="modal-text">もちこと もっとなかよくなれたよ</p>
      <button class="btn primary" id="modal-close" style="width:100%"><span class="name">やったー！</span></button>
    </div>
  </div>

  <div class="food-picker" id="food-picker">
    <div class="food-picker-card">
      <h3>🍽 なにをあげる？</h3>
      <div class="food-grid">
        <button class="food-btn" data-food="carrot"><span class="food-emoji">🥕</span><span class="food-name">にんじん</span></button>
        <button class="food-btn" data-food="lettuce"><span class="food-emoji">🥬</span><span class="food-name">レタス</span></button>
        <button class="food-btn" data-food="apple"><span class="food-emoji">🍎</span><span class="food-name">りんご</span></button>
        <button class="food-btn" data-food="strawberry"><span class="food-emoji">🍓</span><span class="food-name">いちご</span></button>
        <button class="food-btn" data-food="blueberry"><span class="food-emoji">🫐</span><span class="food-name">ベリー</span></button>
        <button class="food-btn" data-food="banana"><span class="food-emoji">🍌</span><span class="food-name">バナナ</span></button>
        <button class="food-btn" data-food="corn"><span class="food-emoji">🌽</span><span class="food-name">とうもろこし</span></button>
        <button class="food-btn" data-food="honey"><span class="food-emoji">🍯</span><span class="food-name">はちみつ</span></button>
        <button class="food-btn fav" data-food="cake"><span class="food-emoji">🍰</span><span class="food-name">ケーキ</span></button>
        <button class="food-btn fav" data-food="cupcake"><span class="food-emoji">🧁</span><span class="food-name">カップケーキ</span></button>
        <button class="food-btn fav" data-food="donut"><span class="food-emoji">🍩</span><span class="food-name">ドーナツ</span></button>
        <button class="food-btn fav" data-food="cookie"><span class="food-emoji">🍪</span><span class="food-name">クッキー</span></button>
        <button class="food-btn fav" data-food="icecream"><span class="food-emoji">🍦</span><span class="food-name">アイス</span></button>
        <button class="food-btn fav" data-food="pudding"><span class="food-emoji">🍮</span><span class="food-name">プリン</span></button>
        <button class="food-btn fav" data-food="chocolate"><span class="food-emoji">🍫</span><span class="food-name">チョコ</span></button>
        <button class="food-btn fav" data-food="candy"><span class="food-emoji">🍬</span><span class="food-name">キャンディ</span></button>
      </div>
      <button class="food-close-btn" id="food-close">とじる</button>
    </div>
  </div>

<script>
(function(){
  const STORAGE_KEY = "rabbit-care-v1";
  const state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return Object.assign(defaults(), JSON.parse(raw));
    } catch(e) {}
    return defaults();
  }
  function defaults() {
    return {
      name: "もちこ",
      happy: 80,
      clean: 70,
      full: 60,
      energy: 75,
      points: 0,
      level: 1,
      dirty: [false,false,false,false],
      sleeping: false,
      tool: null,
    };
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }
  function clamp(v) { return Math.max(0, Math.min(100, v)); }

  const $ = (id) => document.getElementById(id);
  const stage = $("stage");
  const rabbit = $("rabbit");
  const msg = $("msg");

  function render() {
    $("bar-happy").style.width = state.happy + "%";
    $("bar-clean").style.width = state.clean + "%";
    $("bar-full").style.width  = state.full  + "%";
    $("bar-energy").style.width = state.energy + "%";
    $("rabbit-name").textContent = state.name;
    $("points").textContent = state.points;
    $("level").textContent = state.level;

    const spots = document.querySelectorAll(".dirt-spot");
    spots.forEach((el, i) => {
      el.style.opacity = state.dirty[i] ? 1 : 0;
    });

    rabbit.classList.toggle("happy", state.happy >= 85 && !state.sleeping);
    rabbit.classList.toggle("sleeping", state.sleeping);
    rabbit.querySelector(".rabbit").classList.toggle("sleep", state.sleeping);

    document.querySelectorAll("[data-tool]").forEach(b => {
      b.classList.toggle("active", b.dataset.tool === state.tool);
    });
  }

  function setMsg(text) {
    msg.textContent = text;
  }

  function floaty(emoji, x, y) {
    const el = document.createElement("div");
    el.className = "floaty";
    el.textContent = emoji;
    el.style.left = x + "px";
    el.style.top = y + "px";
    stage.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }

  function sparkle(x, y) {
    const el = document.createElement("div");
    el.className = "sparkle";
    el.textContent = "✨";
    el.style.left = x + "px";
    el.style.top = y + "px";
    stage.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function pointsUp(n, label) {
    state.points += n;
    const need = state.level * 30;
    if (state.points >= need) {
      state.level += 1;
      state.points -= need;
      showModal("レベルアップ！🎉", `${state.name}と もっとなかよくなれたよ\n（Lv.${state.level}）`);
    }
    if (label) setMsg(label);
    render();
    save();
  }

  function showModal(title, text) {
    $("modal-title").textContent = title;
    $("modal-text").textContent = text;
    $("modal").classList.add("show");
  }
  $("modal-close").addEventListener("click", () => {
    $("modal").classList.remove("show");
  });

  // === Actions ===
  function pet(x, y) {
    if (state.sleeping) {
      setMsg("Zzz... 起こさないで");
      return;
    }
    state.happy = clamp(state.happy + 4);
    state.energy = clamp(state.energy - 1);
    rabbit.querySelector(".rabbit").classList.remove("bounce");
    void rabbit.offsetWidth;
    rabbit.querySelector(".rabbit").classList.add("bounce");
    floaty("💖", x, y);
    pointsUp(1, "うれしい〜♪");
  }

  const FOODS = {
    carrot:     { emoji: "🥕", name: "にんじん",       full: 18, happy: 3,  energy: 5,  msg: "もぐもぐ にんじん大好き！" },
    lettuce:    { emoji: "🥬", name: "レタス",         full: 12, happy: 2,  energy: 2,  clean: 3,  msg: "シャキシャキ！" },
    apple:      { emoji: "🍎", name: "りんご",         full: 14, happy: 5,  energy: 3,  msg: "あまずっぱくておいしい♪" },
    strawberry: { emoji: "🍓", name: "いちご",         full: 10, happy: 9,  energy: 2,  msg: "いちご大好き💕" },
    blueberry:  { emoji: "🫐", name: "ブルーベリー",   full: 9,  happy: 6,  energy: 6,  msg: "ぷちぷちおいしい！" },
    banana:     { emoji: "🍌", name: "バナナ",         full: 14, happy: 4,  energy: 5,  msg: "もちもち〜" },
    corn:       { emoji: "🌽", name: "とうもろこし",   full: 15, happy: 4,  energy: 4,  msg: "つぶつぶ甘い！" },
    honey:      { emoji: "🍯", name: "はちみつ",       full: 10, happy: 7,  energy: 8,  msg: "とろりあま〜い" },
    cake:       { emoji: "🍰", name: "ショートケーキ", full: 22, happy: 18, energy: 6,  msg: "わぁ〜ケーキだ！🎂", fav: true },
    cupcake:    { emoji: "🧁", name: "カップケーキ",   full: 18, happy: 16, energy: 5,  msg: "カップケーキ最高！🧁", fav: true },
    donut:      { emoji: "🍩", name: "ドーナツ",       full: 18, happy: 11, energy: 4,  msg: "あまーい♪", fav: true },
    cookie:     { emoji: "🍪", name: "クッキー",       full: 11, happy: 9,  energy: 4,  msg: "サクサク！", fav: true },
    icecream:   { emoji: "🍦", name: "アイス",         full: 14, happy: 14, energy: 3,  msg: "つめたくておいしい！", fav: true },
    pudding:    { emoji: "🍮", name: "プリン",         full: 16, happy: 13, energy: 5,  msg: "ぷるぷる〜♡", fav: true },
    chocolate:  { emoji: "🍫", name: "チョコ",         full: 12, happy: 15, energy: 6,  msg: "とろけちゃう…💕", fav: true },
    candy:      { emoji: "🍬", name: "キャンディ",     full: 8,  happy: 10, energy: 4,  msg: "あめちゃん♪", fav: true },
  };

  function openFoodPicker() {
    if (state.sleeping) { setMsg("Zzz... 起きてからね"); return; }
    if (state.full >= 98) { setMsg("もうおなかいっぱい..."); return; }
    $("food-picker").classList.add("show");
  }
  function closeFoodPicker() {
    $("food-picker").classList.remove("show");
  }

  function feed(foodKey) {
    const f = FOODS[foodKey];
    if (!f) return;
    closeFoodPicker();
    if (state.sleeping) { setMsg("Zzz... 起きてからね"); return; }
    if (state.full >= 98) { setMsg("もうおなかいっぱい..."); return; }
    state.full   = clamp(state.full   + (f.full   || 0));
    state.happy  = clamp(state.happy  + (f.happy  || 0));
    state.energy = clamp(state.energy + (f.energy || 0));
    state.clean  = clamp(state.clean  + (f.clean  || 0));
    const r = stage.getBoundingClientRect();
    floaty(f.emoji, r.width/2, r.height - 100);
    if (f.fav) {
      setTimeout(() => floaty("💕", r.width/2 - 30, r.height - 130), 80);
      setTimeout(() => floaty("✨", r.width/2 + 30, r.height - 120), 160);
    }
    rabbit.querySelector(".rabbit").classList.remove("bounce");
    void rabbit.offsetWidth;
    rabbit.querySelector(".rabbit").classList.add("bounce");
    pointsUp(f.fav ? 4 : 2, f.msg);
  }

  function selectTool(tool) {
    state.tool = state.tool === tool ? null : tool;
    if (state.tool === "brush") setMsg("ドラッグして毛をとかしてあげて");
    else if (state.tool === "bath") setMsg("よごれの上をこすってきれいに");
    else if (state.tool === "nail") setMsg("足をタップしてつめをきろう");
    else setMsg("タップしてなでよう！");
    render();
    save();
  }

  function sleepToggle() {
    state.sleeping = !state.sleeping;
    if (state.sleeping) {
      setMsg("Zzz... おやすみなさい");
    } else {
      setMsg("おはよう！");
      state.energy = clamp(state.energy + 30);
      pointsUp(2);
    }
    render();
    save();
  }

  function applyTool(x, y, target) {
    const r = stage.getBoundingClientRect();
    const px = x - r.left;
    const py = y - r.top;
    if (state.tool === "brush") {
      state.clean = clamp(state.clean + 1.5);
      state.happy = clamp(state.happy + 0.6);
      sparkle(px, py);
      if (Math.random() < 0.15) pointsUp(1);
      else { render(); save(); }
    } else if (state.tool === "bath") {
      // remove nearest dirt
      const spots = document.querySelectorAll(".dirt-spot");
      let removed = false;
      spots.forEach((el, i) => {
        if (!state.dirty[i]) return;
        const cb = el.getBoundingClientRect();
        const cx = cb.left + cb.width/2;
        const cy = cb.top + cb.height/2;
        const d = Math.hypot(cx - x, cy - y);
        if (!removed && d < 28) {
          state.dirty[i] = false;
          removed = true;
          state.clean = clamp(state.clean + 8);
          floaty("🫧", px, py);
          pointsUp(2, "ピカピカ✨");
        }
      });
      if (!removed) {
        state.clean = clamp(state.clean + 0.6);
        sparkle(px, py);
        render(); save();
      }
    } else if (state.tool === "nail") {
      // require tapping a foot
      if (target && target.tagName === "ellipse") {
        const cy = parseFloat(target.getAttribute("cy") || "0");
        if (cy > 220) {
          state.happy = clamp(state.happy + 2);
          floaty("✂️", px, py);
          pointsUp(2, "つめスッキリ！");
          return;
        }
      }
      setMsg("足をタップしてつめをきってね");
    }
  }

  // Pointer interactions on the rabbit / stage
  rabbit.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    rabbit.setPointerCapture(e.pointerId);
    if (state.tool) {
      applyTool(e.clientX, e.clientY, e.target);
    } else {
      const r = stage.getBoundingClientRect();
      pet(e.clientX - r.left, e.clientY - r.top);
    }
  });
  rabbit.addEventListener("pointermove", (e) => {
    if (e.buttons === 0 && e.pressure === 0) return;
    if (state.tool) applyTool(e.clientX, e.clientY, e.target);
  });

  // Buttons
  $("btn-pet").addEventListener("click", () => {
    state.tool = null;
    const r = stage.getBoundingClientRect();
    pet(r.width/2, r.height - 140);
  });
  $("btn-feed").addEventListener("click", openFoodPicker);
  $("food-close").addEventListener("click", closeFoodPicker);
  document.querySelectorAll(".food-btn").forEach(btn => {
    btn.addEventListener("click", () => feed(btn.dataset.food));
  });
  $("food-picker").addEventListener("click", (e) => {
    if (e.target.id === "food-picker") closeFoodPicker();
  });
  $("btn-brush").addEventListener("click", () => selectTool("brush"));
  $("btn-bath").addEventListener("click", () => selectTool("bath"));
  $("btn-nail").addEventListener("click", () => selectTool("nail"));
  $("btn-sleep").addEventListener("click", sleepToggle);

  $("btn-rename").addEventListener("click", () => {
    const n = prompt("うさぎの新しいなまえは？", state.name);
    if (n && n.trim()) {
      state.name = n.trim().slice(0, 12);
      render(); save();
    }
  });
  $("btn-reset").addEventListener("click", () => {
    if (confirm("ほんとうに最初からやり直しますか？")) {
      localStorage.removeItem(STORAGE_KEY);
      Object.assign(state, defaults());
      render();
    }
  });

  // === Time tick: stats decrease, dirt builds ===
  setInterval(() => {
    if (state.sleeping) {
      state.energy = clamp(state.energy + 2);
      state.full = clamp(state.full - 0.4);
      // wake up automatically
      if (state.energy >= 100) {
        state.sleeping = false;
        setMsg("ぐっすり寝た！おはよう☀️");
      }
    } else {
      state.happy = clamp(state.happy - 0.6);
      state.full  = clamp(state.full  - 0.8);
      state.clean = clamp(state.clean - 0.4);
      state.energy = clamp(state.energy - 0.3);
    }

    // randomly add dirt
    if (!state.sleeping && Math.random() < 0.12) {
      for (let i = 0; i < state.dirty.length; i++) {
        if (!state.dirty[i]) { state.dirty[i] = true; break; }
      }
    }

    // mood feedback messages occasionally
    if (Math.random() < 0.08) {
      if (state.full < 25) setMsg("おなかすいた...🥕");
      else if (state.clean < 25) setMsg("ちょっとよごれちゃった...🛁");
      else if (state.energy < 25) setMsg("ねむい...💤");
      else if (state.happy < 25) setMsg("さみしいよ...🥺");
      else if (state.happy > 90) setMsg("だいすき！💖");
    }

    render();
    save();
  }, 1500);

  render();
  setMsg("タップしてなでよう！");
})();
</script>
</body>
</html>
