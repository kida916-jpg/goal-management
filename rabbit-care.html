<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>うさぎのお手入れゲーム</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%B0%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg1: #ffe4f0;
    --bg2: #e0f2fe;
    --panel: #ffffffcc;
    --text: #4a3b52;
    --muted: #8a7a92;
    --accent: #ff7aa8;
    --accent-2: #f59ec0;
    --good: #22c55e;
    --warn: #f59e0b;
    --bad: #ef4444;
    --border: #f5d4e2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", "Yu Gothic", "Comic Sans MS", sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 14px 16px 6px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: #b14979;
    text-shadow: 0 2px 0 #fff;
  }
  header p {
    margin: 4px 0 0;
    font-size: 12px;
    color: var(--muted);
  }

  .game {
    max-width: 460px;
    margin: 0 auto;
    padding: 12px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stat .label {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .bar {
    width: 100%;
    height: 8px;
    background: #f1e4eb;
    border-radius: 999px;
    overflow: hidden;
  }
  .bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #ffb3c8, #ff7aa8);
    transition: width 0.4s ease;
    border-radius: 999px;
  }
  .bar.clean > span { background: linear-gradient(90deg, #93e2ff, #38bdf8); }
  .bar.fullness > span { background: linear-gradient(90deg, #ffd591, #f59e0b); }
  .bar.energy > span { background: linear-gradient(90deg, #c4b5fd, #8b5cf6); }

  .score {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .score b { color: var(--accent); font-size: 16px; }

  .stage {
    position: relative;
    background: linear-gradient(180deg, #fff7fb 0%, #fce4ec 100%);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px;
    height: 320px;
    overflow: hidden;
    box-shadow: inset 0 -8px 18px #ffd1e1aa;
  }
  .stage::before {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 60px;
    background: linear-gradient(180deg, #fbcfe8, #f0abfc44);
    border-top: 2px dashed #f9a8d4;
  }
  .clouds {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    font-size: 22px;
    color: #fff;
    display: flex;
    justify-content: space-around;
    opacity: 0.85;
    pointer-events: none;
  }
  .stage-msg {
    position: absolute;
    top: 8px;
    right: 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    box-shadow: 0 2px 8px #fbcfe888;
  }

  .rabbit-wrap {
    position: absolute;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%);
    width: 200px;
    height: 240px;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .rabbit-wrap:active { cursor: grabbing; }
  .rabbit {
    width: 100%;
    height: 100%;
    transition: transform 0.2s ease;
    transform-origin: 50% 100%;
  }
  .rabbit.bounce { animation: bounce 0.6s ease; }
  @keyframes bounce {
    0%   { transform: translateY(0) scale(1, 1); }
    25%  { transform: translateY(-12px) scale(0.98, 1.04); }
    50%  { transform: translateY(0) scale(1.04, 0.96); }
    75%  { transform: translateY(-6px) scale(0.99, 1.02); }
    100% { transform: translateY(0) scale(1, 1); }
  }
  .rabbit.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px) rotate(-3deg); }
    75% { transform: translateX(6px) rotate(3deg); }
  }
  .rabbit.sleep { animation: sleep 2s ease-in-out infinite; }
  @keyframes sleep {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.02, 0.98); }
  }

  .floaty {
    position: absolute;
    pointer-events: none;
    font-size: 22px;
    animation: floaty 1.2s ease-out forwards;
  }
  @keyframes floaty {
    0%   { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
  }
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 16px;
    animation: sparkle 0.9s ease-out forwards;
  }
  @keyframes sparkle {
    0% { transform: translate(-50%, -50%) scale(0.4) rotate(0); opacity: 0; }
    40% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.4) rotate(180deg); opacity: 0; }
  }

  .actions {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 14px;
    padding: 8px 4px;
    font-family: inherit;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s;
    box-shadow: 0 2px 0 #f5d4e2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .btn:hover { background: #fff5f9; }
  .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #f5d4e2; }
  .btn .ico { font-size: 22px; line-height: 1; }
  .btn .name { font-weight: bold; font-size: 11px; }
  .btn .desc { font-size: 9px; color: var(--muted); }
  .btn.primary { background: linear-gradient(180deg, #ffd1e0, #ffb1cc); border-color: #ffb1cc; }
  .btn[data-tool="brush"].active,
  .btn[data-tool="bath"].active,
  .btn[data-tool="nail"].active {
    outline: 3px solid #ff7aa8;
    background: #fff0f6;
  }

  .footer {
    margin-top: 10px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
  .footer button {
    appearance: none;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: #4a3b5288;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 16px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    max-width: 320px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px #00000022;
  }
  .modal-card h2 { margin: 0 0 8px; color: var(--accent); font-size: 18px; }
  .modal-card p { margin: 0 0 12px; font-size: 13px; color: var(--text); white-space: pre-line; }

  /* Food picker */
  .food-picker {
    position: fixed;
    inset: 0;
    background: #4a3b5266;
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 60;
    padding: 0;
  }
  .food-picker.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .food-picker-card {
    background: #fff;
    border-radius: 22px 22px 0 0;
    padding: 16px 14px 18px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 -10px 30px #00000022;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .food-picker-card h3 {
    margin: 0 0 10px;
    text-align: center;
    font-size: 15px;
    color: var(--accent);
  }
  .food-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .food-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: #fff5f9;
    border-radius: 14px;
    padding: 10px 4px 6px;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    box-shadow: 0 2px 0 #f5d4e2;
  }
  .food-btn .food-emoji { font-size: 28px; line-height: 1; }
  .food-btn .food-name {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .food-btn:active { transform: translateY(1px) scale(0.96); background: #ffe8f1; }
  .food-btn.fav {
    background: linear-gradient(180deg, #fff0f6, #ffd1e0);
    border-color: #ffb1cc;
  }
  .food-btn.fav .food-name { color: #b14979; font-weight: bold; }
  .food-close-btn {
    appearance: none;
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 14px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
  }

  .level-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd1e0, #ffb1cc);
    color: #b14979;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: bold;
    margin-left: 4px;
  }

  /* SVG rabbit cosmetic states */
  .dirt-spot { transition: opacity 0.3s; }
  .heart-eye, .sleep-eye, .comfort-eye, .comfort-mouth { display: none; }
  .rabbit-wrap.happy .heart-eye { display: block; }
  .rabbit-wrap.happy .normal-eye { display: none; }
  .rabbit-wrap.sleeping .normal-eye { display: none; }
  .rabbit-wrap.sleeping .sleep-eye { display: block; }
  .rabbit-wrap.brushing .normal-eye,
  .rabbit-wrap.brushing .heart-eye,
  .rabbit-wrap.brushing .sleep-eye { display: none; }
  .rabbit-wrap.brushing .comfort-eye { display: block; }
  .rabbit-wrap.brushing .normal-mouth { display: none; }
  .rabbit-wrap.brushing .comfort-mouth { display: block; }
  .rabbit-wrap.bathing { transform: translateX(-50%) translateY(-12px); }

  /* Ear stand/lop toggle */
  .ear-stand-left, .ear-stand-right { display: none; }
  .ear-lop-left, .ear-lop-right { display: none; }
  .rabbit-wrap.both-up   .ear-stand-left,
  .rabbit-wrap.both-up   .ear-stand-right,
  .rabbit-wrap.flop-left .ear-stand-right,
  .rabbit-wrap.flop-right .ear-stand-left { display: block; }
  .rabbit-wrap.flop-left .ear-lop-left,
  .rabbit-wrap.flop-right .ear-lop-right { display: block; }
  .rabbit-wrap.both-up .ear-stand-left,
  .rabbit-wrap.both-up .ear-stand-right,
  .rabbit-wrap.flop-left .ear-stand-right,
  .rabbit-wrap.flop-right .ear-stand-left {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: earPop 0.7s ease;
  }
  .rabbit-wrap.flop-left .ear-lop-left,
  .rabbit-wrap.flop-right .ear-lop-right {
    transform-box: fill-box;
    transform-origin: 50% 0%;
    animation: earDrop 0.5s ease;
  }
  @keyframes earPop {
    0%   { transform: scaleY(0.15) rotate(-10deg); opacity: 0.4; }
    40%  { transform: scaleY(1.12) rotate(2deg);   opacity: 1; }
    65%  { transform: scaleY(0.92) rotate(-2deg); }
    85%  { transform: scaleY(1.04) rotate(1deg); }
    100% { transform: scaleY(1)    rotate(0); }
  }
  @keyframes earDrop {
    0%   { transform: scaleY(0.4); opacity: 0.6; }
    60%  { transform: scaleY(1.05); opacity: 1; }
    100% { transform: scaleY(1); }
  }

  /* Bathtub */
  .bathtub {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    width: 300px;
    height: 130px;
    display: none;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, transform 0.4s ease;
  }
  .bathtub.show {
    display: block;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
    touch-action: none;
  }
  .bathtub svg { width: 100%; height: 100%; display: block; }
  .bath-wave {
    transform-origin: center;
    animation: wave 1.5s ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  .bath-bubble {
    position: absolute;
    pointer-events: none;
    font-size: 18px;
    animation: bubbleUp 1.5s ease-out forwards;
  }
  @keyframes bubbleUp {
    0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(-50%, -90px) scale(1.1); opacity: 0; }
  }
  .splash {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    animation: splashPop 0.7s ease-out forwards;
  }
  @keyframes splashPop {
    0%   { transform: translate(-50%, 0) scale(0.4); opacity: 0; }
    40%  { transform: translate(-50%, -25px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50px) scale(1.4); opacity: 0; }
  }

  /* Outfit picker (reuses food picker styling) */
  .outfit-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .outfit-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: #fff5f9;
    border-radius: 14px;
    padding: 10px 4px 6px;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    box-shadow: 0 2px 0 #f5d4e2;
  }
  .outfit-btn .outfit-emoji { font-size: 26px; line-height: 1; }
  .outfit-btn .outfit-name {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .outfit-btn:active { transform: translateY(1px) scale(0.96); background: #ffe8f1; }
  .outfit-btn.active {
    background: linear-gradient(180deg, #fff0f6, #ffd1e0);
    border-color: #ffb1cc;
    outline: 2px solid #ff7aa8;
  }
</style>
</head>
<body>
  <header>
    <h1>🐰 うさぎのお手入れ</h1>
    <p>なでて・ブラッシングして・ごはんをあげよう</p>
  </header>

  <div class="game">
    <div class="stats">
      <div class="stat">
        <div class="label">😊 きげん</div>
        <div class="bar"><span id="bar-happy" style="width:80%"></span></div>
      </div>
      <div class="stat">
        <div class="label">✨ きれい</div>
        <div class="bar clean"><span id="bar-clean" style="width:70%"></span></div>
      </div>
      <div class="stat">
        <div class="label">🍽 おなか</div>
        <div class="bar fullness"><span id="bar-full" style="width:60%"></span></div>
      </div>
      <div class="stat">
        <div class="label">⚡️ げんき</div>
        <div class="bar energy"><span id="bar-energy" style="width:75%"></span></div>
      </div>
    </div>

    <div class="score">
      なまえ: <b id="rabbit-name">もちこ</b>
      <span class="level-badge">Lv.<span id="level">1</span></span>
      &nbsp;|&nbsp; お世話ポイント <b id="points">0</b>
    </div>

    <div class="stage" id="stage">
      <div class="clouds"><span>☁️</span><span>☁️</span><span>☁️</span></div>
      <div class="stage-msg" id="msg">タップしてなでよう！</div>

      <div class="bathtub" id="bathtub">
        <svg viewBox="0 0 300 130" preserveAspectRatio="xMidYMax meet">
          <!-- tub body -->
          <path d="M 25 35
                   Q 25 125, 150 125
                   Q 275 125, 275 35
                   L 265 35
                   Q 265 110, 150 110
                   Q 35 110, 35 35 Z"
                fill="#ffffff" stroke="#5a3a2a" stroke-width="4" stroke-linejoin="round"/>
          <!-- tub feet -->
          <ellipse cx="55" cy="125" rx="10" ry="6" fill="#5a3a2a"/>
          <ellipse cx="245" cy="125" rx="10" ry="6" fill="#5a3a2a"/>
          <!-- water -->
          <path d="M 38 50
                   Q 38 108, 150 108
                   Q 262 108, 262 50 Z"
                fill="#7dd3fc"/>
          <!-- water surface waves -->
          <g class="bath-wave">
            <path d="M 38 50 Q 70 44, 100 50 T 162 50 T 224 50 T 262 50"
                  fill="none" stroke="#0284c7" stroke-width="2" opacity="0.5"/>
            <path d="M 50 60 Q 80 56, 110 60 T 172 60 T 234 60"
                  fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.35"/>
          </g>
          <!-- foam bubbles in water -->
          <circle cx="70" cy="78" r="7" fill="#ffffff" opacity="0.85"/>
          <circle cx="90" cy="68" r="5" fill="#ffffff" opacity="0.75"/>
          <circle cx="210" cy="78" r="8" fill="#ffffff" opacity="0.85"/>
          <circle cx="230" cy="70" r="5" fill="#ffffff" opacity="0.75"/>
          <circle cx="150" cy="92" r="6" fill="#ffffff" opacity="0.7"/>
        </svg>
      </div>

      <div class="rabbit-wrap" id="rabbit">
        <svg class="rabbit" viewBox="0 0 240 270" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
              <feOffset dy="2"/>
              <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- ground shadow -->
          <ellipse cx="120" cy="262" rx="80" ry="6" fill="#00000018"/>

          <!-- LEFT LOP EAR (drawn behind everything) -->
          <g class="ear-lop-left">
            <path d="M 92 55
                     C 60 60, 35 95, 38 150
                     C 40 175, 55 185, 72 178
                     C 90 168, 98 130, 100 90
                     C 100 65, 98 50, 92 55 Z"
                  fill="#ffffff"
                  stroke="#5a3a2a" stroke-width="3.5" stroke-linejoin="round"/>
            <path d="M 78 95
                     C 58 108, 50 140, 56 168
                     C 62 178, 70 178, 76 168
                     C 84 152, 88 115, 88 95 Z"
                  fill="#d4b8a0"/>
          </g>

          <!-- LEFT EAR STANDING UP -->
          <g class="ear-stand-left">
            <ellipse cx="90" cy="48" rx="22" ry="34"
                     transform="rotate(-14 90 48)"
                     fill="#ffffff" stroke="#5a3a2a" stroke-width="3.5"/>
            <ellipse cx="90" cy="54" rx="11" ry="22"
                     transform="rotate(-14 90 54)"
                     fill="#d4b8a0"/>
          </g>

          <!-- RIGHT LOP EAR -->
          <g class="ear-lop-right">
            <path d="M 148 55
                     C 180 60, 205 95, 202 150
                     C 200 175, 185 185, 168 178
                     C 150 168, 142 130, 140 90
                     C 140 65, 142 50, 148 55 Z"
                  fill="#ffffff"
                  stroke="#5a3a2a" stroke-width="3.5" stroke-linejoin="round"/>
            <path d="M 162 95
                     C 182 108, 190 140, 184 168
                     C 178 178, 170 178, 164 168
                     C 156 152, 152 115, 152 95 Z"
                  fill="#d4b8a0"/>
          </g>

          <!-- RIGHT EAR STANDING UP -->
          <g class="ear-stand-right">
            <ellipse cx="150" cy="48" rx="22" ry="34"
                     transform="rotate(14 150 48)"
                     fill="#ffffff" stroke="#5a3a2a" stroke-width="3.5"/>
            <ellipse cx="150" cy="54" rx="11" ry="22"
                     transform="rotate(14 150 54)"
                     fill="#d4b8a0"/>
          </g>

          <!-- HEAD TUFT (between ears) -->
          <path d="M 102 65 Q 110 50, 118 60 Q 124 50, 132 60 Q 137 55, 138 65"
                fill="#fff" stroke="#5a3a2a" stroke-width="3"
                stroke-linejoin="round" stroke-linecap="round"/>

          <!-- BODY -->
          <path d="M 70 168
                   C 60 200, 55 235, 80 248
                   Q 120 256, 160 248
                   C 185 235, 180 200, 170 168
                   Z"
                fill="#fff" stroke="#5a3a2a" stroke-width="3.5" stroke-linejoin="round"/>

          <!-- FEET (sides) -->
          <ellipse cx="78" cy="246" rx="20" ry="11" fill="#fff"
                   stroke="#5a3a2a" stroke-width="3"/>
          <ellipse cx="162" cy="246" rx="20" ry="11" fill="#fff"
                   stroke="#5a3a2a" stroke-width="3"/>
          <ellipse cx="78" cy="248" rx="6" ry="3" fill="#f8c5c8"/>
          <ellipse cx="162" cy="248" rx="6" ry="3" fill="#f8c5c8"/>

          <!-- FRONT PAWS -->
          <ellipse cx="105" cy="240" rx="13" ry="16" fill="#fff"
                   stroke="#5a3a2a" stroke-width="3"/>

  const STORAGE_KEY = "rabbit-care-v1";

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return Object.assign(defaults(), JSON.parse(raw));
    } catch(e) {}
    return defaults();
  }
  function defaults() {
    return {
      name: "もちこ",
      happy: 80,
      clean: 70,
      full: 60,
      energy: 75,
      points: 0,
      level: 1,
      dirty: [false,false,false,false],
      sleeping: false,
      tool: null,
      outfit: "none",
    };
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }
  function clamp(v) { return Math.max(0, Math.min(100, v)); }

    rabbit.classList.toggle("bathing", state.tool === "bath");

    princess: { emoji: "👑", name: "おひめさま", svg: `<g><g transform="translate(120 50)"><path d="M-22 0 L-16 -16 L-8 -6 L0 -20 L8 -6 L16 -16 L22 0 Z" fill="#fde047" stroke="#5a3a2a" stroke-width="2.5" stroke-linejoin="round"/><circle cx="-13" cy="-13" r="2" fill="#ef4444"/><circle cx="0" cy="-17" r="2" fill="#ef4444"/><circle cx="13" cy="-13" r="2" fill="#ef4444"/></g><path d="M 60 175 Q 95 168, 120 168 Q 145 168, 180 175 Q 190 218, 198 252 Q 120 262, 42 252 Q 50 218, 60 175 Z" fill="#fda4d6" stroke="#5a3a2a" stroke-width="3" stroke-linejoin="round"/><path d="M 65 210 Q 120 205, 175 210" fill="none" stroke="#fde047" stroke-width="3"/><text x="108" y="232" font-size="14">💎</text></g>` },
    pajamas:  { emoji: "🌙", name: "パジャマ",   svg: `<g><path d="M 65 175 Q 95 168, 120 168 Q 145 168, 175 175 L 180 245 Q 120 252, 60 245 Z" fill="#a5b4fc" stroke="#5a3a2a" stroke-width="3" stroke-linejoin="round"/><text x="74" y="200" font-size="13">⭐</text><text x="138" y="195" font-size="13">⭐</text><text x="100" y="225" font-size="13">🌙</text></g>` },
    kimono:   { emoji: "👘", name: "きもの",     svg: `<g><path d="M 60 175 Q 95 168, 120 168 Q 145 168, 180 175 L 185 245 Q 120 252, 55 245 Z" fill="#dc2626" stroke="#5a3a2a" stroke-width="3" stroke-linejoin="round"/><path d="M 120 168 L 100 245 M 120 168 L 140 245" stroke="#5a3a2a" stroke-width="2"/><rect x="55" y="205" width="130" height="14" fill="#fde047" stroke="#5a3a2a" stroke-width="2"/><circle cx="90" cy="220" r="3" fill="#fff"/><circle cx="150" cy="220" r="3" fill="#fff"/></g>` },
    sailor:   { emoji: "⚓", name: "セーラー服", svg: `<g><path d="M 70 175 Q 95 168, 120 168 Q 145 168, 170 175 L 175 245 Q 120 252, 65 245 Z" fill="#fff" stroke="#5a3a2a" stroke-width="3" stroke-linejoin="round"/><path d="M 88 170 L 120 200 L 152 170 L 152 175 L 120 205 L 88 175 Z" fill="#3b82f6" stroke="#5a3a2a" stroke-width="2" stroke-linejoin="round"/><path d="M 110 198 L 120 210 L 130 198 L 125 207 L 120 210 L 115 207 Z" fill="#dc2626" stroke="#5a3a2a" stroke-width="1.5"/><line x1="92" y1="172" x2="100" y2="172" stroke="#fff" stroke-width="2"/><line x1="140" y1="172" x2="148" y2="172" stroke="#fff" stroke-width="2"/></g>` },
    chef:     { emoji: "👨‍🍳", name: "コック",     svg: `<g><g transform="translate(120 55)"><ellipse cx="0" cy="-5" rx="22" ry="14" fill="#fff" stroke="#5a3a2a" stroke-width="2.5"/><rect x="-15" y="0" width="30" height="6" fill="#fff" stroke="#5a3a2a" stroke-width="2"/></g><path d="M 70 175 Q 95 168, 120 168 Q 145 168, 170 175 L 175 245 Q 120 252, 65 245 Z" fill="#fff" stroke="#5a3a2a" stroke-width="3" stroke-linejoin="round"/><circle cx="105" cy="195" r="3" fill="#5a3a2a"/><circle cx="105" cy="210" r="3" fill="#5a3a2a"/><circle cx="105" cy="225" r="3" fill="#5a3a2a"/></g>` },
    swim:     { emoji: "🏊", name: "みずぎ",     svg: `<g><path d="M 80 178 Q 100 175, 120 175 Q 140 175, 160 178 L 168 240 Q 120 250, 72 240 Z" fill="#ec4899" stroke="#5a3a2a" stroke-width="3" stroke-linejoin="round"/><path d="M 90 195 Q 120 192, 150 195" fill="none" stroke="#fff" stroke-width="3"/><path d="M 90 215 Q 120 212, 150 215" fill="none" stroke="#fff" stroke-width="3"/></g>` },
  };

  function applyOutfit() {
    const overlay = document.getElementById("outfit-overlay");
    if (!overlay) return;
    const o = OUTFITS[state.outfit] || OUTFITS.none;
    overlay.innerHTML = o.svg;
  }
  function buildOutfitGrid() {
    const grid = $("outfit-grid");
    grid.innerHTML = "";
    Object.entries(OUTFITS).forEach(([key, o]) => {
      const btn = document.createElement("button");
      btn.className = "outfit-btn" + (state.outfit === key ? " active" : "");
      btn.dataset.outfit = key;
      btn.innerHTML = `<span class="outfit-emoji">${o.emoji}</span><span class="outfit-name">${o.name}</span>`;
      btn.addEventListener("click", () => selectOutfit(key));
      grid.appendChild(btn);
    });
  }
  function openOutfitPicker() {
    buildOutfitGrid();
    $("outfit-picker").classList.add("show");
  }
  function closeOutfitPicker() {
    $("outfit-picker").classList.remove("show");
  }
  function selectOutfit(key) {
    state.outfit = key;
    setMsg(OUTFITS[key].name === "なし" ? "すっぴん〜♪" : `${OUTFITS[key].name} かわいい！`);
    if (state.outfit !== "none") {
      state.happy = clamp(state.happy + 3);
      pointsUp(1);
    }
    buildOutfitGrid();
    render();
    save();
    setTimeout(closeOutfitPicker, 250);
  }

  function setMsg(text) {
    msg.textContent = text;
  }

  function floaty(emoji, x, y) {
    const el = document.createElement("div");
    el.className = "floaty";
    el.textContent = emoji;
    el.style.left = x + "px";
    el.style.top = y + "px";
    stage.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }

  function sparkle(x, y) {
    const el = document.createElement("div");
    el.className = "sparkle";
    el.textContent = "✨";
    el.style.left = x + "px";
    el.style.top = y + "px";
    stage.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function pointsUp(n, label) {
    state.points += n;
    const need = state.level * 30;
    if (state.points >= need) {
      state.level += 1;
      state.points -= need;
      showModal("レベルアップ！🎉", `${state.name}と もっとなかよくなれたよ\n（Lv.${state.level}）`);
    }
    if (label) setMsg(label);
    render();
    save();
  }

  function showModal(title, text) {
    $("modal-title").textContent = title;
    $("modal-text").textContent = text;
    $("modal").classList.add("show");
  }
  $("modal-close").addEventListener("click", () => {
    $("modal").classList.remove("show");
  });

  // === Actions ===
  function pet(x, y) {
    if (state.sleeping) {
      setMsg("Zzz... 起こさないで");
      return;
    }
    state.happy = clamp(state.happy + 4);
    state.energy = clamp(state.energy - 1);
    rabbit.querySelector(".rabbit").classList.remove("bounce");
    void rabbit.offsetWidth;
    rabbit.querySelector(".rabbit").classList.add("bounce");
    floaty("💖", x, y);
    pointsUp(1, "うれしい〜♪");
  }

  const FOODS = {
    carrot:     { emoji: "🥕", name: "にんじん",       full: 18, happy: 3,  energy: 5,  msg: "もぐもぐ にんじん大好き！" },
    lettuce:    { emoji: "🥬", name: "レタス",         full: 12, happy: 2,  energy: 2,  clean: 3,  msg: "シャキシャキ！" },
    apple:      { emoji: "🍎", name: "りんご",         full: 14, happy: 5,  energy: 3,  msg: "あまずっぱくておいしい♪" },

    blueberry:  { emoji: "🫐", name: "ブルーベリー",   full: 9,  happy: 6,  energy: 6,  msg: "ぷちぷちおいしい！" },
    banana:     { emoji: "🍌", name: "バナナ",         full: 14, happy: 4,  energy: 5,  msg: "もちもち〜" },
    corn:       { emoji: "🌽", name: "とうもろこし",   full: 15, happy: 4,  energy: 4,  msg: "つぶつぶ甘い！" },
    honey:      { emoji: "🍯", name: "はちみつ",       full: 10, happy: 7,  energy: 8,  msg: "とろりあま〜い" },
    cake:       { emoji: "🍰", name: "ショートケーキ", full: 22, happy: 18, energy: 6,  msg: "わぁ〜ケーキだ！🎂", fav: true },
    cupcake:    { emoji: "🧁", name: "カップケーキ",   full: 18, happy: 16, energy: 5,  msg: "カップケーキ最高！🧁", fav: true },
    donut:      { emoji: "🍩", name: "ドーナツ",       full: 18, happy: 11, energy: 4,  msg: "あまーい♪", fav: true },
    cookie:     { emoji: "🍪", name: "クッキー",       full: 11, happy: 9,  energy: 4,  msg: "サクサク！", fav: true },
    icecream:   { emoji: "🍦", name: "アイス",         full: 14, happy: 14, energy: 3,  msg: "つめたくておいしい！", fav: true },
    pudding:    { emoji: "🍮", name: "プリン",         full: 16, happy: 13, energy: 5,  msg: "ぷるぷる〜♡", fav: true },
    chocolate:  { emoji: "🍫", name: "チョコ",         full: 12, happy: 15, energy: 6,  msg: "とろけちゃう…💕", fav: true },
    candy:      { emoji: "🍬", name: "キャンディ",     full: 8,  happy: 10, energy: 4,  msg: "あめちゃん♪", fav: true },
  };

  function openFoodPicker() {
    if (state.sleeping) { setMsg("Zzz... 起きてからね"); return; }
    if (state.full >= 98) { setMsg("もうおなかいっぱい..."); return; }
    $("food-picker").classList.add("show");
  }
  function closeFoodPicker() {
    $("food-picker").classList.remove("show");
  }

  function feed(foodKey) {
    const f = FOODS[foodKey];
    if (!f) return;
    closeFoodPicker();
    if (state.sleeping) { setMsg("Zzz... 起きてからね"); return; }
    if (state.full >= 98) { setMsg("もうおなかいっぱい..."); return; }
    state.full   = clamp(state.full   + (f.full   || 0));
    state.happy  = clamp(state.happy  + (f.happy  || 0));
    state.energy = clamp(state.energy + (f.energy || 0));
    state.clean  = clamp(state.clean  + (f.clean  || 0));
    const r = stage.getBoundingClientRect();
    floaty(f.emoji, r.width/2, r.height - 100);
    if (f.fav) {
      setTimeout(() => floaty("💕", r.width/2 - 30, r.height - 130), 80);
      setTimeout(() => floaty("✨", r.width/2 + 30, r.height - 120), 160);
    }
    rabbit.querySelector(".rabbit").classList.remove("bounce");
    void rabbit.offsetWidth;
    rabbit.querySelector(".rabbit").classList.add("bounce");
    pointsUp(f.fav ? 4 : 2, f.msg);
  }

  function selectTool(tool) {
    state.tool = state.tool === tool ? null : tool;
    rabbit.classList.remove("brushing");
    if (state.tool === "brush") setMsg("ドラッグして毛をとかしてあげて");
    else if (state.tool === "bath") setMsg("じゃぶじゃぶ〜♪ こすってあげて");
    else if (state.tool === "nail") setMsg("足をタップしてつめをきろう");
    else setMsg("タップしてなでよう！");
    render();
    save();
  }

  function bathBubble(x, y) {
    const el = document.createElement("div");
    el.className = "bath-bubble";
    el.textContent = Math.random() < 0.5 ? "🫧" : "💧";
    el.style.left = x + "px";
    el.style.top = y + "px";
    stage.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
  function splashFx(x, y) {
    const el = document.createElement("div");
    el.className = "splash";
    el.textContent = "💦";
    el.style.left = x + "px";
    el.style.top = y + "px";
    stage.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function sleepToggle() {
    state.sleeping = !state.sleeping;
    if (state.sleeping) {
      setMsg("Zzz... おやすみなさい");
    } else {
      setMsg("おはよう！");
      state.energy = clamp(state.energy + 30);
      pointsUp(2);
    }
    render();
    save();
  }

  function applyTool(x, y, target) {
    const r = stage.getBoundingClientRect();
    const px = x - r.left;
    const py = y - r.top;
    if (state.tool === "brush") {
      rabbit.classList.add("brushing");
      clearTimeout(rabbit._brushT);
      rabbit._brushT = setTimeout(() => rabbit.classList.remove("brushing"), 600);
      state.clean = clamp(state.clean + 1.5);
      state.happy = clamp(state.happy + 0.8);
      sparkle(px, py);
      if (Math.random() < 0.2) {
        const r = stage.getBoundingClientRect();
        floaty("💭", r.width/2 + 30, r.height - 230);
        pointsUp(1, "きもちいい〜♪");
      }
      else { render(); save(); }
    } else if (state.tool === "bath") {
      bathBubble(px, py);
      if (Math.random() < 0.4) splashFx(px + (Math.random()*40-20), py - 10);
      const spots = document.querySelectorAll(".dirt-spot");
      let removed = false;
      spots.forEach((el, i) => {
        if (!state.dirty[i]) return;
        const cb = el.getBoundingClientRect();
        const cx = cb.left + cb.width/2;
        const cy = cb.top + cb.height/2;
        const d = Math.hypot(cx - x, cy - y);
        if (!removed && d < 32) {
          state.dirty[i] = false;
          removed = true;
          state.clean = clamp(state.clean + 8);
          state.happy = clamp(state.happy + 2);
          pointsUp(2, "ピカピカ✨");
        }
      });
      if (!removed) {
        state.clean = clamp(state.clean + 0.8);
        state.happy = clamp(state.happy + 0.3);
        render(); save();
      }
    } else if (state.tool === "nail") {
      // require tapping a foot
      if (target && target.tagName === "ellipse") {
        const cy = parseFloat(target.getAttribute("cy") || "0");
        if (cy > 220) {
          state.happy = clamp(state.happy + 2);
          floaty("✂️", px, py);
          pointsUp(2, "つめスッキリ！");
          return;
        }
      }
      setMsg("足をタップしてつめをきってね");
    }
  }

  // Pointer interactions on the rabbit / stage
  rabbit.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    rabbit.setPointerCapture(e.pointerId);
    if (state.tool) {
      applyTool(e.clientX, e.clientY, e.target);
    } else {
      const r = stage.getBoundingClientRect();
      pet(e.clientX - r.left, e.clientY - r.top);
    }
  });
  rabbit.addEventListener("pointermove", (e) => {
    if (e.buttons === 0 && e.pressure === 0) return;
    if (state.tool) applyTool(e.clientX, e.clientY, e.target);
  });
  rabbit.addEventListener("pointerup", () => {
    if (state.tool === "brush") {
      clearTimeout(rabbit._brushT);
      rabbit._brushT = setTimeout(() => rabbit.classList.remove("brushing"), 800);
    }
  });
  // Allow scrubbing inside the bathtub area
  $("bathtub").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    $("bathtub").setPointerCapture(e.pointerId);
    if (state.tool === "bath") applyTool(e.clientX, e.clientY, e.target);
  });
  $("bathtub").addEventListener("pointermove", (e) => {
    if (e.buttons === 0 && e.pressure === 0) return;
    if (state.tool === "bath") applyTool(e.clientX, e.clientY, e.target);
  });

  // Buttons
  $("btn-pet").addEventListener("click", () => {
    state.tool = null;
    const r = stage.getBoundingClientRect();
    pet(r.width/2, r.height - 140);
  });
  $("btn-feed").addEventListener("click", openFoodPicker);
  $("food-close").addEventListener("click", closeFoodPicker);
  document.querySelectorAll(".food-btn").forEach(btn => {
    btn.addEventListener("click", () => feed(btn.dataset.food));
  });
  $("food-picker").addEventListener("click", (e) => {
    if (e.target.id === "food-picker") closeFoodPicker();
  });
  $("btn-brush").addEventListener("click", () => selectTool("brush"));
  $("btn-bath").addEventListener("click", () => selectTool("bath"));
  $("btn-nail").addEventListener("click", () => selectTool("nail"));
  $("btn-sleep").addEventListener("click", sleepToggle);
  $("btn-outfit").addEventListener("click", openOutfitPicker);
  $("outfit-close").addEventListener("click", closeOutfitPicker);
  $("outfit-picker").addEventListener("click", (e) => {
    if (e.target.id === "outfit-picker") closeOutfitPicker();
  });

  $("btn-rename").addEventListener("click", () => {
    const n = prompt("うさぎの新しいなまえは？", state.name);
    if (n && n.trim()) {
      state.name = n.trim().slice(0, 12);
      render(); save();
    }
  });
  $("btn-reset").addEventListener("click", () => {
    if (confirm("ほんとうに最初からやり直しますか？")) {
      localStorage.removeItem(STORAGE_KEY);
      Object.assign(state, defaults());
      render();
    }
  });

  // === Time tick: stats decrease, dirt builds ===
  setInterval(() => {
    if (state.sleeping) {
      state.energy = clamp(state.energy + 2);
      state.full = clamp(state.full - 0.4);
      // wake up automatically
      if (state.energy >= 100) {
        state.sleeping = false;
        setMsg("ぐっすり寝た！おはよう☀️");
      }
    } else {
      state.happy = clamp(state.happy - 0.6);
      state.full  = clamp(state.full  - 0.8);
      state.clean = clamp(state.clean - 0.4);
      state.energy = clamp(state.energy - 0.3);
    }

    // randomly add dirt
    if (!state.sleeping && Math.random() < 0.12) {
      for (let i = 0; i < state.dirty.length; i++) {
        if (!state.dirty[i]) { state.dirty[i] = true; break; }
      }
    }

    // mood feedback messages occasionally
    if (Math.random() < 0.08) {
      if (state.full < 25) setMsg("おなかすいた...🥕");
      else if (state.clean < 25) setMsg("ちょっとよごれちゃった...🛁");
      else if (state.energy < 25) setMsg("ねむい...💤");
      else if (state.happy < 25) setMsg("さみしいよ...🥺");
      else if (state.happy > 90) setMsg("だいすき！💖");
    }

    render();
    save();
  }, 1500);

  render();
  setMsg("タップしてなでよう！");

  // Ears: both up by default; occasionally one flops
  function setEars(cls) {
    rabbit.classList.remove("both-up", "flop-left", "flop-right");
    void rabbit.offsetWidth; // restart CSS animation
    rabbit.classList.add(cls);
  }
  setEars("both-up");
  setInterval(() => {
    const r = Math.random();
    if (r < 0.7) setEars("both-up");
    else if (r < 0.85) setEars("flop-left");
    else setEars("flop-right");
  }, 15000);
})();
</script>
</body>
</html>
